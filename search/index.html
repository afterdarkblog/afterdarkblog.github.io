        class="search-input"

        type="search"
        name="q"
        autocomplete="off"
        spellcheck="false"
        aria-controls="search-results"
        aria-describedby="search-help search-status"
        placeholder="Search by title, tag, or content">
      <p id="search-help" class="search-hint">
        Search across your indexed content. Press <kbd>/</kbd> to focus the field.
      </p>
      <p id="search-status" class="search-status" data-search-status aria-live="polite">

    </section>

      <p class="search-status search-status-error">Search requires JavaScript to load the index and filter results.</p>
    </noscript>
